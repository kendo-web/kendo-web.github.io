      <div id="userList"><div style="text-align:center;padding:40px;color:var(--text3);">読み込み中...</div></div>
    </div>
  </div>`;

  const users = await getAllUsers();

  if (users.length === 0) {
    document.getElementById('userList').innerHTML =
      '<div style="text-align:center;padding:40px;color:var(--text3);">ユーザーがいません</div>';
    return;
  }

  const html = users.map(u => `
  <div class="tournament-card" style="flex-direction:column;align-items:stretch;gap:10px;" id="ucard_${u.uid}">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="flex:1;">
        <div style="font-size:11px;color:var(--text3);font-family:monospace;margin-bottom:2px;">${u.email || ''}</div>
        <div style="font-size:15px;font-weight:700;color:var(--navy);">${u.name || '（名前未設定）'}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px;">
          担当大会：${(u.tournaments || []).join('、') || 'なし'}
        </div>
      </div>
      <button class="tournament-card-btn" onclick="toggleUserEdit('${u.uid}')">編集</button>
    </div>
    <div id="uedit_${u.uid}" style="display:none;border-top:1px solid var(--border);padding-top:10px;">
      <div class="admin-field">
        <label class="admin-label">名前・団体名</label>
        <input class="admin-input" id="uname_${u.uid}" value="${u.name || ''}" placeholder="例：NTT東海剣道部">
      </div>
      <div class="admin-field">
        <label class="admin-label">メモ</label>
        <input class="admin-input" id="umemo_${u.uid}" value="${u.memo || ''}" placeholder="例：担当：山田さん">
      </div>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button class="admin-btn-primary" onclick="saveUserInfo('${u.uid}')" style="flex:1;">💾 保存</button>
        <button class="admin-btn-secondary" onclick="toggleUserEdit('${u.uid}')" style="flex:1;">キャンセル</button>
      </div>
    </div>
    ${u.memo ? `<div style="font-size:12px;color:var(--text2);background:var(--bg);padding:6px 10px;border-radius:var(--r2);">📝 ${u.memo}</div>` : ''}
  </div>`).join('');

  document.getElementById('userList').innerHTML = html;
}

function toggleUserEdit(uid) {
  const el = document.getElementById('uedit_' + uid);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function saveUserInfo(uid) {
  const name = (document.getElementById('uname_' + uid).value || '').trim();
  const memo = (document.getElementById('umemo_' + uid).value || '').trim();
  try {
    await updateUserInfo(uid, name, memo);
    showToast('✅ ユーザー情報を保存しました');
    renderSystemAdmin();
  } catch(e) {
    showToast('⚠ 保存に失敗しました');
  }
}

/* ---- ログアウト ---- */
function adminLogout() {
  if (!confirm('ログアウトしますか？')) return;
  auth.signOut().then(() => {
    adminAuthed = false;
    render();
    showToast('ログアウトしました');
  }).catch(e => {
    console.warn('Logout error:', e);
    showToast('⚠ ログアウトに失敗しました');
  });
}

/* ---- 大会終了・アーカイブ ---- */
function archiveTournament() {
  if (!confirm('大会を終了してアーカイブします。\n結果の変更ができなくなります。\nよろしいですか？')) return;
  const archives = loadArchives();
  const now = new Date().toLocaleDateString('ja-JP');
  archives.unshift({
    name: tournamentConfig.name,
    date: tournamentConfig.date,
    archivedAt: now,
    matches: JSON.parse(JSON.stringify(matches)),
    config: JSON.parse(JSON.stringify(tournamentConfig)),
  });
  saveArchives(archives);

  tournamentConfig.isArchived = true;
  tournamentConfig.archivedAt = now;
  saveConfig();

  // 入力画面も更新不可に
  showToast('🔒 大会をアーカイブしました');
  render();
}

function startNewTournament() {
  if (!confirm('新しい大会を開始します。\n現在のデータはアーカイブに保存されています。\nよろしいですか？')) return;
  tournamentConfig = {
    name: '新しい大会',
    date: '',
    divisions: [
      { id: 'elementary', name: '小学生の部', blocks: 4 },
      { id: 'middle',     name: '中学生の部', blocks: 4 },
    ],
    isArchived: false,
    archivedAt: null,
    thirdPlace: tournamentConfig.thirdPlace || false, // 前大会の設定を引き継ぐ
  };
  saveConfig();
  matches = buildAllMatches();
  saveState();
  showToast('🆕 新しい大会を開始しました');
  render();
}

/* ---- アーカイブ表示・DL ---- */
let _archiveBackup = null; // アーカイブ表示中の元データ退避

function viewArchive(i) {
  const archives = loadArchives();
  const arch = archives[i];
  if (!arch) return;
  // 現在のmatchesをバックアップ
  _archiveBackup = JSON.parse(JSON.stringify(matches));
  matches = arch.matches;
  mode = 'view';
  render();
  showToast('📚 ' + arch.name + ' を表示中（読み取り専用）');
}

function exitArchiveView() {
  if (_archiveBackup) {
    matches = _archiveBackup;
    _archiveBackup = null;
  } else {
    loadState();
  }
  mode = 'admin';
  render();
}

function downloadArchive(i) {
  const archives = loadArchives();
  const arch = archives[i];
  if (!arch) return;
  const csv = matchesToCSV(arch.matches);
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (arch.name || '大会') + '_結果.csv';
  a.click();
  URL.revokeObjectURL(url);
}

/* ---- チーム名編集 ---- */
function renderTeamEditList() {
  const divSel = document.getElementById('editDivSelect');
  const blkSel = document.getElementById('editBlockSelect');
  if (!divSel || !blkSel) return;

  const divName = divSel.value;
  const blockName = blkSel.value;

  // 選択部門に合わせてブロック選択肢を更新
  const blocks = [...new Set(
    matches.filter(m => m.division === divName && m.blockLabel !== '上位戦').map(m => m.blockLabel)
  )];
  blkSel.innerHTML = blocks.map(b => `<option value="${b}" ${b===blockName?'selected':''}>${b}</option>`).join('');

  const selectedBlock = blkSel.value || blocks[0];

  // 選択ブロック内の1回戦チーム名を収集（重複なし）
  const r1 = matches.filter(m =>
    m.division === divName && m.blockLabel === selectedBlock && m.round === '1回戦'
  );
  const teamNames = [];
  r1.forEach(m => {
    if (m.leftTeamName && !teamNames.includes(m.leftTeamName))
      teamNames.push(m.leftTeamName);
    if (m.rightTeamName && !teamNames.includes(m.rightTeamName))
      teamNames.push(m.rightTeamName);
  });

  const listEl = document.getElementById('teamEditList');
  if (!listEl) return;

  if (teamNames.length === 0) {
    listEl.innerHTML = '<div style="color:var(--text3);font-size:13px;">チームデータがありません</div>';
    return;
  }

  listEl.innerHTML = teamNames.map((name, i) => `
    <div class="team-edit-row">
      <input class="team-edit-input" data-original="${name}" value="${name}"
        maxlength="15" oninput="checkTeamNameLength(this)">
      <span class="team-edit-count" id="tc_${i}">${name.length}/15</span>
    </div>`).join('');
}

function checkTeamNameLength(input) {
  const len = input.value.length;
  const countEl = input.parentElement.querySelector('.team-edit-count');
  if (countEl) {
    countEl.textContent = len + '/15';
    countEl.style.color = len > 15 ? 'var(--red)' : 'var(--text3)';
  }
  input.style.borderColor = len > 15 ? 'var(--red)' : '';
}

function saveTeamEdits() {
  const rows = document.querySelectorAll('.team-edit-input');
  if (!rows.length) { showToast('⚠ 編集するチームがありません'); return; }

  // バリデーション
  const errors = [];
  rows.forEach(input => {
    const newName = input.value.trim();
    if (!newName) errors.push('チーム名が空のものがあります');
    if (newName.length > 15) errors.push(`「${newName}」は${newName.length}文字です（上限15文字）`);
  });
  if (errors.length > 0) {
    alert('以下のエラーを修正してください。\n\n' + [...new Set(errors)].join('\n'));
    return;
  }

  // 変更を適用
  let changeCount = 0;
  rows.forEach(input => {
    const oldName = input.dataset.original;
    const newName = input.value.trim();
    if (oldName === newName) return;

    // matches内の全出現箇所を置換
    matches.forEach(m => {
      if (m.leftTeamName === oldName)  { m.leftTeamName = newName; changeCount++; }
      if (m.rightTeamName === oldName) { m.rightTeamName = newName; changeCount++; }
      if (m.reporter === oldName) m.reporter = newName; // 報告者名は変えない
    });
    input.dataset.original = newName;
  });

  if (changeCount === 0) {
    showToast('変更はありませんでした');
    return;
  }

  saveState();
  showToast('✅ ' + changeCount + '箇所のチーム名を変更しました');
  render();
}

/* ---- 全データリセット ---- */
function resetAllData() {
  if (!confirm('全てのデータをリセットします。\nFirebase上の試合結果・設定・アーカイブが全て消えます。\n\nよろしいですか？')) return;

  // localStorageのkendo_系キーを削除
  try {
    Object.keys(localStorage).filter(k => k.startsWith('kendo_')).forEach(k => {
      try { localStorage.removeItem(k); } catch(e) {}
    });
  } catch(e) {}

  // Firebaseのこの大会データをクリア（matchesは空に、CSVインポートで再登録）
  const newConfig = {
    name: tournamentConfig.name || '剣道大会', date: '',
    divisions: [
      { id:'elementary', name:'小学生の部', blocks:4 },
      { id:'middle',     name:'中学生の部', blocks:4 },
    ],
    isArchived: false, archivedAt: null, thirdPlace: false, inputPin: null,
  };
  fbRef('matches').remove().catch(e => console.warn(e));
  fbRef('config').set(newConfig).catch(e => console.warn(e));
  fbRef('archives').remove().catch(e => console.warn(e));

  operatorName = '';
  adminAuthed = false;

  showToast('✅ データをリセットしました');
  render();
}

function matchesToCSV(ms) {
  const header = '試合ID,部門,ブロック,回戦,赤チーム,白チーム,勝者,状態,報告者,登録日時';
  const rows = ms.map(m => {
    const rw = getRedWhite(m);
    const winnerName = m.winner === rw.red ? rw.redName : (m.winner === rw.white ? rw.whiteName : '');
    return [
      m.matchId, m.division, m.blockLabel, m.round,
      rw.redName||'', rw.whiteName||'', winnerName,
      m.status, m.reporter||'', m.reportedAt||''
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  return header + '\n' + rows.join('\n');
}

  loadOperatorName();

});
